<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verum Sales Global — Ecosystem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4f8; --surface: #ffffff; --surface-2: #f6f8fb;
  --border: #dde3ed; --text: #18243a; --text-2: #4a5a78; --text-3: #8a9ab8;
  --sidebar-w: 240px; --topnav-h: 56px;
  --c-core: #1e3a8a; --c-core-bg: #dbeafe;
  --c-br: #065f46;   --c-br-bg: #d1fae5;
  --c-usa: #1d4ed8;  --c-usa-bg: #bfdbfe;
  --c-mex: #991b1b;  --c-mex-bg: #fee2e2;
  --c-canal: #92400e; --c-canal-bg: #fef3c7;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* TOPBAR */
#topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 20px; padding: 0 20px;
  flex-shrink: 0; flex-wrap: wrap; min-height: var(--topnav-h);
}
.logo { font-size: 14px; font-weight: 700; white-space: nowrap; padding-right: 16px; border-right: 1px solid var(--border); }
.logo span { color: #1d4ed8; }
.filter-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; padding: 8px 0; }
.filter-group-label { font-size: 10px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; white-space: nowrap; }
.pill {
  font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 999px;
  border: 1px solid var(--border); background: var(--surface-2); color: var(--text-2);
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.pill:hover { border-color: #93c5fd; background: #eff6ff; }
.pill.active { border-color: transparent; }
.pill[data-tag="CORE"].active { background: var(--c-core-bg); color: var(--c-core); }
.pill[data-tag="BR"].active   { background: var(--c-br-bg);   color: var(--c-br); }
.pill[data-tag="USA"].active  { background: var(--c-usa-bg);  color: var(--c-usa); }
.pill[data-tag="MEX"].active  { background: var(--c-mex-bg);  color: var(--c-mex); }
.pill[data-group="canal"].active { background: var(--c-canal-bg); color: var(--c-canal); }
.sep { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }

/* LAYOUT */
#layout { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
#sidebar {
  width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; padding: 12px 0; flex-shrink: 0; overflow-y: auto;
}
.pilar-btn {
  display: flex; align-items: center; gap: 10px; padding: 10px 16px;
  cursor: pointer; border: none; background: none; width: 100%; text-align: left;
  color: var(--text-2); font-size: 13px; font-family: 'Inter', sans-serif; transition: background .15s;
}
.pilar-btn:hover { background: var(--surface-2); }
.pilar-btn.active { background: #eff6ff; color: #1d4ed8; font-weight: 600; }
.pilar-icon { font-size: 16px; flex-shrink: 0; }
.pilar-label { flex: 1; }
.pilar-count { font-size: 11px; font-weight: 600; background: var(--surface-2); color: var(--text-3); padding: 2px 6px; border-radius: 999px; min-width: 22px; text-align: center; }
.pilar-btn.active .pilar-count { background: #dbeafe; color: #1d4ed8; }

/* CONTENT */
#content { flex: 1; overflow-y: auto; padding: 24px; }
#content-header { margin-bottom: 20px; }
#content-title { font-size: 18px; font-weight: 700; }
#content-subtitle { font-size: 13px; color: var(--text-3); margin-top: 4px; }
#cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }

/* PERSONA GROUPS */
.persona-group-label {
  grid-column: 1/-1; font-size: 11px; font-weight: 700; color: var(--text-3);
  text-transform: uppercase; letter-spacing: .08em; padding: 4px 0;
  border-bottom: 1px solid var(--border); margin-top: 8px;
}
.persona-group-label:first-child { margin-top: 0; }

/* CARDS */
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px; display: flex; flex-direction: column; gap: 10px;
  transition: box-shadow .15s;
}
.card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.card.gap-critico { border-left: 4px solid #dc2626; }
.card.gap-alto    { border-left: 4px solid #ea580c; }
.card.gap-medio   { border-left: 4px solid #ca8a04; }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.card-id { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-3); }
.card-tags { display: flex; flex-wrap: wrap; gap: 4px; justify-content: flex-end; }
.tag-badge { font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 4px; }
.tag-CORE  { background: var(--c-core-bg); color: var(--c-core); }
.tag-BR    { background: var(--c-br-bg);   color: var(--c-br); }
.tag-USA   { background: var(--c-usa-bg);  color: var(--c-usa); }
.tag-MEX   { background: var(--c-mex-bg);  color: var(--c-mex); }
.tag-canal { background: var(--c-canal-bg); color: var(--c-canal); }
.card-titulo { font-size: 14px; font-weight: 600; line-height: 1.35; }
.card-descricao { font-size: 13px; color: var(--text-2); line-height: 1.5; }
.card-footer { display: flex; align-items: center; justify-content: space-between; }
.badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
.s-ativo      { background: #d1fae5; color: #065f46; }
.s-em-revisao { background: #fef9c3; color: #92400e; }
.s-gap        { background: #fee2e2; color: #991b1b; }
.s-pendente   { background: #f3f4f6; color: #6b7280; }
.sev-critico  { background: #fee2e2; color: #dc2626; }
.sev-alto     { background: #ffedd5; color: #ea580c; }
.sev-medio    { background: #fef9c3; color: #ca8a04; }
.prio-P1 { background: #ede9fe; color: #7c3aed; }
.prio-P2 { background: #e0f2fe; color: #0369a1; }
.prio-P3 { background: #f3f4f6; color: #374151; }
.expand-btn { font-size: 11px; font-weight: 500; color: #3b82f6; background: none; border: none; cursor: pointer; font-family: 'Inter', sans-serif; }
.card-detail { display: none; font-size: 13px; color: var(--text-2); line-height: 1.6; border-top: 1px solid var(--border); padding-top: 10px; }
.card-detail.open { display: block; }
.card-rel { font-size: 12px; color: var(--text-3); margin-top: 6px; }
.card-rel strong { color: var(--text-2); }
#empty-state { display: none; text-align: center; padding: 60px 20px; color: var(--text-3); font-size: 14px; }
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">Verum <span>Sales Global</span></div>
  <div class="filter-group" id="fg-escopo">
    <span class="filter-group-label">Scope</span>
  </div>
  <div class="sep"></div>
  <div class="filter-group" id="fg-canal">
    <span class="filter-group-label">Channel</span>
  </div>
</div>

<div id="layout">
  <nav id="sidebar"></nav>
  <main id="content">
    <div id="content-header">
      <div id="content-title"></div>
      <div id="content-subtitle"></div>
    </div>
    <div id="cards-grid"></div>
    <div id="empty-state">No items match the active filters.</div>
  </main>
</div>

<script>
const TAG_GROUPS = {
  escopo: ["CORE","BR","USA","MEX"],
  canal:  ["B2B","B2Fleet","B2C","Gripmaster","API","Government","Fleet Rental","Key Account"]
};

const PILARES = [
  { id:"identidade", icon:"🔐", label:"Identity & Permissiveness", desc:"Who can do what with whom" },
  { id:"personas",   icon:"👥", label:"Personas & Channels",       desc:"System access journeys" },
  { id:"motores",    icon:"⚙️", label:"Calculation Engines",       desc:"Pricing and promotions" },
  { id:"gaps",       icon:"⚠️", label:"Gaps & Risks",              desc:"Where the system fails" },
  { id:"ia",         icon:"🤖", label:"Intelligence & Automation", desc:"AI opportunities" }
];

const ITEMS = [
  // IDENTITY
  { id:"PERM-001", pilar:"identidade", status:"ativo", tags:["CORE"],
    titulo:"Tax Classification Sovereignty",
    descricao:"The client's tax identity (Consumption vs. Resale) is determined by CNAE and never changes based on the sales channel.",
    detalhe:"Regardless of whether the client accesses via B2B, B2C, API, or any other channel, their tax classification is immutable. Ensures fiscal compliance and prevents different classifications per channel.",
    relacionados:["PERM-002","PERM-003","GAP-001"] },
  { id:"PERM-002", pilar:"identidade", status:"ativo", tags:["CORE"],
    titulo:"Consumption Classification — CNAE",
    descricao:"Clients with a consumption CNAE buy for their own use. They receive the Consumption price table and have no access to Resale tax benefits.",
    detalhe:"Consumption CNAEs: transport companies, mining, agribusiness — use tires as operational input, not for resale.",
    relacionados:["PERM-001","PERM-004"] },
  { id:"PERM-003", pilar:"identidade", status:"ativo", tags:["CORE"],
    titulo:"Resale Classification — CNAE",
    descricao:"Clients with a tire retail CNAE are classified as Resale. They access the Resale price table and may qualify for tax benefits.",
    detalhe:"Resale CNAEs: tire shops, distributors, specialized repair shops. They have access to Group 106, TTD and Manufacturer benefits when applicable by state.",
    relacionados:["PERM-001","PERM-004","PERM-005","PERM-006"] },
  { id:"PERM-004", pilar:"identidade", status:"ativo", tags:["CORE","BR"],
    titulo:"Tax Benefit — Group 106",
    descricao:"Resale clients in participating states under Group 106 are entitled to ICMS rate reduction — but the benefit is NOT applied automatically. The seller must remember to request it.",
    detalhe:"State agreement that reduces the ICMS tax burden for the tire Resale channel. Eligibility validated by the client's state. Alters the final price calculation and must be reflected in the invoice. Currently the process is manual: the seller must identify eligibility and request the benefit — if they forget, the client loses it.",
    relacionados:["PERM-003","PERM-005","PERM-006"] },
  { id:"PERM-005", pilar:"identidade", status:"ativo", tags:["CORE","BR"],
    titulo:"Tax Benefit — TTD (Special Tax Treatment)",
    descricao:"Differentiated Tax Treatment: reduces the tax burden via ICMS presumed credit in specific states for Resale clients.",
    detalhe:"Varies by state and product type. The system must validate the client's state and SKU to determine applicability per transaction.",
    relacionados:["PERM-004","PERM-006","PERM-012"] },
  { id:"PERM-006", pilar:"identidade", status:"ativo", tags:["CORE","BR"],
    titulo:"Tax Benefit — Manufacturer",
    descricao:"OEM clients or automakers receive special ICMS and IPI tax conditions distinct from standard tables.",
    detalhe:"Manufacturers incorporate tires into new vehicles. Requires specific registration and additional documentation. Benefit applies only to the manufacturer's CNPJ.",
    relacionados:["PERM-004","PERM-005"] },
  { id:"PERM-007", pilar:"identidade", status:"ativo", tags:["CORE","Government"],
    titulo:"Access Block — Government Procurement",
    descricao:"Government procurement channel clients can only be served by authorized Government Sales specialists.",
    detalhe:"Government procurement requires knowledge of public legislation, specific pricing and special documentation. The block prevents fiscal errors that generate legal penalties.",
    relacionados:["PER-005","GAP-007"] },
  { id:"PERM-008", pilar:"identidade", status:"ativo", tags:["CORE","Fleet Rental"],
    titulo:"Access Block — Fleet Rental",
    descricao:"Fleet Rental channel clients can only be served by authorized Fleet Sales specialists.",
    detalhe:"Fleet rental companies have contracts with per-kilometer pricing, guaranteed minimum volume and distinct SLAs. The channel requires specialized consultative negotiation.",
    relacionados:["PER-004","GAP-007"] },
  { id:"PERM-009", pilar:"identidade", status:"ativo", tags:["CORE"],
    titulo:"Shared Credit — Economic Group",
    descricao:"Companies in the same Economic Group share a credit limit. Default by one company blocks the entire group.",
    detalhe:"Consolidated limit: if the holding has R$500k and a subsidiary uses R$300k, R$200k remains for all other companies in the group.",
    relacionados:["GAP-001","GAP-004","IA-003"] },
  { id:"PERM-010", pilar:"identidade", status:"ativo", tags:["CORE"],
    titulo:"Inactive Account — SAP Credit Review",
    descricao:"Clients with an inactive SAP account must go through a credit re-analysis before any transaction.",
    detalhe:"Re-analysis includes credit bureau consultation, verification of the economic group CNPJs and Credit Leader approval.",
    relacionados:["PERM-009","GAP-001","PER-007"] },
  { id:"PERM-011", pilar:"identidade", status:"em-revisão", tags:["CORE","BR"],
    titulo:"Cross-shipping — BillingWarehouse",
    descricao:"Allows an order billed by one distribution center (DC) to be delivered by a different DC. Exception rule with direct fiscal impact on the invoice.",
    detalhe:"Used when the nearest DC has no stock. Another DC delivers but the invoice is issued from the seller's origin DC. May create interstate ICMS inconsistencies.",
    relacionados:["PERM-012","MOT-001","GAP-009"] },
  { id:"PERM-012", pilar:"identidade", status:"em-revisão", tags:["CORE","BR"],
    titulo:"State-level Tax Deviation",
    descricao:"Origin state × destination state × CNAE combinations can create involuntary tax deviations. The system must alert before confirming at-risk orders.",
    detalhe:"Certain state combinations generate ICMS rate differences that must be passed on to the client or absorbed. Without an alert, the seller may close orders with fiscal losses.",
    relacionados:["PERM-005","PERM-011","GAP-001"] },
  { id:"PERM-013", pilar:"identidade", status:"ativo", tags:["CORE","BR"],
    titulo:"Supply = Resale Channel Only",
    descricao:"The supply system (CROSS/Backorder) only allows Resale-type clients to access DC surplus stock. Consumption clients are automatically blocked.",
    detalhe:"This is a blocking rule in the Pricing Module and product search. DC supply stock only appears when there is an active Supply Rule that satisfies the client's Shipping Rule (region/channel). Benchmarks indicate modern systems evolve toward omnichannel access with margin-protection controls.",
    relacionados:["PERM-001","PERM-002","PERM-003","PERM-014","GAP-014","MOT-010"] },
  { id:"PERM-014", pilar:"identidade", status:"em-revisão", tags:["CORE","BR"],
    titulo:"Supply Hierarchy — BU + Client + Route",
    descricao:"Supply permissiveness depends on three simultaneous variables: seller's BU + Client Type (Consumption/Resale) + available Logistics Route.",
    detalhe:"For supply stock to appear in search, all three conditions must be met: (1) seller's BU has an active supply rule, (2) client is Resale type, (3) a DC→Branch logistics route is configured by Supply for that region. Failure in any of the three blocks the supply.",
    relacionados:["PERM-013","MOT-009","PER-025","GAP-012"] },
  { id:"PERM-015", pilar:"identidade", status:"em-revisão", tags:["CORE"],
    titulo:"Shared Account — Owner vs. Served By",
    descricao:"The current 'account ownership' model prevents multiple BUs from serving the same client with distinct pricing and commission rules per BU. A Gripmaster + B2Fleet client cannot be served by both teams simultaneously.",
    detalhe:"Today the CRM operates on an exclusive ownership model: one 'owner' seller per account. To evolve to multi-BU (e.g., Gripmaster serves OTR + B2Fleet serves cargo for the same CNPJ), the system must distinguish 'Owner' (primary responsible) from 'Served By' (BU with active sales access). Each BU would have independent price tables, commission and fiscal permissiveness for the same client. Prerequisite for real omnichannel expansion.",
    relacionados:["PERM-001","PERM-002","PERM-014","GAP-014","MOT-010"] },

  // PERSONAS
  { id:"PER-001", pilar:"personas", status:"ativo", tags:["CORE","BR","B2B","B2Fleet"], grupo:"sales",
    titulo:"Sales Rep",
    descricao:"Core B2B and B2Fleet sales profile. Accesses assigned portfolio, creates quotes, orders and tracks approvals.",
    detalhe:"Visibility restricted to own portfolio. Can request price and payment term exceptions via approval flow. Requires Commercial Leader approval for discounts above the BU threshold.",
    relacionados:["PER-010","MOT-001","GAP-002","GAP-005"] },
  { id:"PER-002", pilar:"personas", status:"ativo", tags:["CORE","BR","Key Account"], grupo:"sales",
    titulo:"Key Account Manager",
    descricao:"Manages high-volume strategic accounts. Negotiates contracts, SLAs and special conditions.",
    detalhe:"Manages clients above the billing threshold defined by management. Can propose special price tables requiring Commercial Manager approval.",
    relacionados:["PER-010","PER-016","GAP-008"] },
  { id:"PER-003", pilar:"personas", status:"ativo", tags:["CORE","BR","B2B"], grupo:"sales",
    titulo:"SDR",
    descricao:"Prospects new clients, qualifies leads and books meetings for sales reps. Does not finalize orders.",
    detalhe:"Gap: current system has no prospecting module — SDRs use external spreadsheets.",
    relacionados:["PER-001","IA-013","GAP-007"] },
  { id:"PER-004", pilar:"personas", status:"ativo", tags:["CORE","BR","Fleet Rental"], grupo:"sales",
    titulo:"Fleet Rental Sales Rep",
    descricao:"Fleet channel specialist. Manages per-kilometer supply contracts with guaranteed minimum volume.",
    detalhe:"Serves major fleet rental companies. Annual contracts with quarterly review. Requires fleet consumption reports for projections.",
    relacionados:["PERM-008","PER-013","GAP-008"] },
  { id:"PER-005", pilar:"personas", status:"ativo", tags:["CORE","BR","Government"], grupo:"sales",
    titulo:"Government Procurement Sales Rep",
    descricao:"Government procurement specialist. Qualifies the company in public tenders and manages public contracts.",
    detalhe:"Works with delivery deadlines governed by price registration records. Requires integration with public procurement portals.",
    relacionados:["PERM-007","PER-014","GAP-007"] },
  { id:"PER-006", pilar:"personas", status:"ativo", tags:["CORE","BR","B2B"], grupo:"operations",
    titulo:"Sales Assistant",
    descricao:"Supports sales reps in order processing, invoice generation and delivery tracking.",
    detalhe:"Accesses orders from the entire branch team. Cannot approve discounts or exceptions. Records incidents and contacts carriers.",
    relacionados:["PER-001","PER-010","GAP-005"] },
  { id:"PER-007", pilar:"personas", status:"ativo", tags:["CORE","BR"], grupo:"operations",
    titulo:"Credit Analyst",
    descricao:"Analyzes credit requests, collects documentation, consults credit bureaus and forwards for approval.",
    detalhe:"No final approval authority — all credit goes to the Credit Leader. Gap G01: system does not show the economic group limit, only the individual CNPJ.",
    relacionados:["PERM-009","PERM-010","PER-011","GAP-001","GAP-004"] },
  { id:"PER-008", pilar:"personas", status:"ativo", tags:["CORE","BR"], grupo:"operations",
    titulo:"Pricing Analyst",
    descricao:"Maintains price tables, applies list price adjustments and processes price exceptions approved by the leader.",
    detalhe:"Does not define prices — executes Pricing Leader decisions. Gap G06: when price changes, the seller with an open quote is not notified.",
    relacionados:["PER-012","MOT-001","GAP-006"] },
  { id:"PER-009", pilar:"personas", status:"ativo", tags:["CORE","BR"], grupo:"operations",
    titulo:"Branch Assistant",
    descricao:"General operational support: receiving merchandise, stock check, delivery scheduling.",
    detalhe:"Access to stock and logistics module. No access to commercial data (price, credit).",
    relacionados:["PER-013","PER-015"] },
  { id:"PER-010", pilar:"personas", status:"ativo", tags:["CORE","BR","B2B"], grupo:"operations",
    titulo:"Commercial Leader",
    descricao:"Manages the branch sales team. Approves price and payment term exceptions within their authority threshold.",
    detalhe:"Discount approval threshold defined by BU and management. Sees the entire team's portfolio. Gap G05: no automatic record of which Leader approved which exception.",
    relacionados:["PER-001","PER-016","GAP-005","GAP-002"] },
  { id:"PER-011", pilar:"personas", status:"ativo", tags:["CORE","BR"], grupo:"operations",
    titulo:"Credit Leader",
    descricao:"Approves credit analyses forwarded by the Credit Analyst. Has authority up to the branch limit.",
    detalhe:"Approvals above the branch limit go to the Commercial Manager or Fiscal Manager. Gap G04: economic group analysis is still manual.",
    relacionados:["PER-007","PERM-009","GAP-001","GAP-004","IA-003","IA-004"] },
  { id:"PER-012", pilar:"personas", status:"ativo", tags:["CORE","BR"], grupo:"operations",
    titulo:"Pricing Leader",
    descricao:"Defines the branch pricing policy within national guidelines. Approves table exceptions.",
    detalhe:"Works with tables by BU, state and client segment. Responsible for ensuring national promotions are correctly implemented.",
    relacionados:["PER-008","MOT-001","GAP-006","IA-007"] },
  { id:"PER-013", pilar:"personas", status:"ativo", tags:["CORE","BR"], grupo:"operations",
    titulo:"Logistics Leader",
    descricao:"Manages branch logistics: routing, carriers, delivery SLAs and incidents.",
    detalhe:"Defines which carrier serves which route. Monitors delivery performance. Coordinates cross-docking and transfers between DCs.",
    relacionados:["PER-009","IA-016"] },
  { id:"PER-014", pilar:"personas", status:"ativo", tags:["CORE","BR","Government"], grupo:"operations",
    titulo:"Government Procurement Leader",
    descricao:"Coordinates participation in government tenders. Defines proposal strategy and approves participation in public bids.",
    detalhe:"Evaluates viability of each tender (minimum margin, delivery capacity, penalty risk). Monitors portfolio of active price registration records.",
    relacionados:["PER-005","PERM-007"] },
  { id:"PER-015", pilar:"personas", status:"ativo", tags:["CORE","BR"], grupo:"operations",
    titulo:"Branch Manager",
    descricao:"Responsible for the complete branch operation: commercial targets, credit, logistics and team.",
    detalhe:"Sees complete branch KPIs: billing, margin, delinquency, NPS, inventory turnover. Approves exceptions that exceed Leaders' thresholds.",
    relacionados:["PER-016","PER-010","PER-011","PER-012"] },
  { id:"PER-016", pilar:"personas", status:"ativo", tags:["CORE","BR"], grupo:"operations",
    titulo:"Regional Manager",
    descricao:"Supervises multiple branches in a region. Sets regional targets and approves exceptions above the branch threshold.",
    detalhe:"Consolidated view of all regional branches. Can reallocate resources between branches.",
    relacionados:["PER-015","PER-017","GAP-005"] },
  { id:"PER-017", pilar:"personas", status:"ativo", tags:["CORE","BR"], grupo:"operations",
    titulo:"National Manager",
    descricao:"Responsible for national commercial operations. Defines pricing and credit policy.",
    detalhe:"Full business visibility: all regions, branches, channels. Defines authority thresholds for all levels below.",
    relacionados:["PER-016","PER-018","MOT-001"] },
  { id:"PER-018", pilar:"personas", status:"ativo", tags:["CORE","BR"], grupo:"operations",
    titulo:"Commercial Director",
    descricao:"Executive commercial leadership. Defines strategy and approves high-impact initiatives.",
    detalhe:"Access to executive dashboards: total billing, gross margin, market share by region. Approves exceptions without threshold.",
    relacionados:["PER-017","PER-019"] },
  { id:"PER-019", pilar:"personas", status:"ativo", tags:["CORE","BR"], grupo:"operations",
    titulo:"Fiscal Manager",
    descricao:"Responsible for fiscal compliance. Approves tax benefits and validates at-risk invoices.",
    detalhe:"Validates eligibility for tax benefits (Group 106, TTD, Manufacturer). Approves cross-shipping operations with fiscal risk.",
    relacionados:["PERM-004","PERM-005","PERM-006","PERM-012","GAP-001"] },
  { id:"PER-020", pilar:"personas", status:"ativo", tags:["CORE","BR"], grupo:"operations",
    titulo:"SalesSupport",
    descricao:"Specialized back-office support: special configurations, system error resolution and out-of-standard-flow cases.",
    detalhe:"Has access to advanced SAP features that sellers and assistants don't have. Escalation point before Admin.",
    relacionados:["PER-021","GAP-007"] },
  { id:"PER-021", pilar:"personas", status:"ativo", tags:["CORE"], grupo:"operations",
    titulo:"Administrator",
    descricao:"Full system access. Manages users, permissions, global configurations and integrations.",
    detalhe:"Only profile with power to create/delete users and access complete logs. Gap G07: currently the only one who can resolve certain types of block, creating an operational bottleneck.",
    relacionados:["GAP-007","IA-014"] },

// STATE
let activePilar = "identidade";
const activeFilters = { escopo: new Set(), canal: new Set() };

// FILTER
function matchesFilters(item) {
  const escopoOk = activeFilters.escopo.size === 0 || item.tags.some(t => activeFilters.escopo.has(t));
  const canalOk  = activeFilters.canal.size  === 0 || item.tags.some(t => activeFilters.canal.has(t));
  return escopoOk && canalOk;
}
function itemsForPilar(id) { return ITEMS.filter(i => i.pilar === id && matchesFilters(i)); }

// TAG BADGE
function tagBadge(tag) {
  const cls = TAG_GROUPS.escopo.includes(tag) ? `tag-${tag}` : "tag-canal";
  return `<span class="tag-badge ${cls}">${tag}</span>`;
}

// RENDER FILTERS
function renderFilters() {
  const usedE = new Set(), usedC = new Set();
  ITEMS.forEach(i => i.tags.forEach(t => {
    if (TAG_GROUPS.escopo.includes(t)) usedE.add(t);
    if (TAG_GROUPS.canal.includes(t))  usedC.add(t);
  }));
  function pills(tags, group, used, containerId) {
    const el = document.getElementById(containerId);
    const label = el.querySelector('.filter-group-label');
    el.innerHTML = "";
    el.appendChild(label);
    tags.filter(t => used.has(t)).forEach(t => {
      const btn = document.createElement("button");
      btn.className = "pill" + (activeFilters[group].has(t) ? " active" : "");
      btn.dataset.group = group; btn.dataset.tag = t; btn.textContent = t;
      el.appendChild(btn);
    });
  }
  pills(TAG_GROUPS.escopo, "escopo", usedE, "fg-escopo");
  pills(TAG_GROUPS.canal,  "canal",  usedC, "fg-canal");
}

// RENDER SIDEBAR
function renderSidebar() {
  document.getElementById("sidebar").innerHTML = PILARES.map(p => {
    const c = itemsForPilar(p.id).length;
    return `<button class="pilar-btn${p.id === activePilar ? " active" : ""}" data-pilar="${p.id}">
      <span class="pilar-icon">${p.icon}</span>
      <span class="pilar-label">${p.label}</span>
      <span class="pilar-count">${c}</span>
    </button>`;
  }).join("");
}

// RENDER CARD
function renderCard(item) {
  const sLabel = { "ativo":"Active","em-revisão":"Under Review","gap":"Gap","pendente":"Pending" };
  const sCls   = { "ativo":"s-ativo","em-revisão":"s-em-revisao","gap":"s-gap","pendente":"s-pendente" };
  const sevL   = { critico:"CRITICAL", alto:"HIGH", medio:"MEDIUM" };

  let footer = "";
  if (item.pilar === "gaps" && item.severidade)
    footer = `<span class="badge sev-${item.severidade}">${sevL[item.severidade]}</span>`;
  else if (item.pilar === "ia" && item.prioridade)
    footer = `<span class="badge prio-${item.prioridade}">${item.prioridade}${item.tecnologia ? " · " + item.tecnologia : ""}</span>`;
  else
    footer = `<span class="badge ${sCls[item.status]}">${sLabel[item.status]}</span>`;

  const gapCls = item.pilar === "gaps" && item.severidade ? ` gap-${item.severidade}` : "";
  const hasDetail = item.detalhe || (item.relacionados && item.relacionados.length);

  return `<div class="card${gapCls}">
    <div class="card-top">
      <span class="card-id">${item.id}</span>
      <div class="card-tags">${item.tags.map(tagBadge).join("")}</div>
    </div>
    <div class="card-titulo">${item.titulo}</div>
    <div class="card-descricao">${item.descricao}</div>
    <div class="card-footer">
      ${footer}
      ${hasDetail ? `<button class="expand-btn" onclick="toggleCard('${item.id}')">▼ See more</button>` : ""}
    </div>
    ${hasDetail ? `<div class="card-detail" id="det-${item.id}">
      ${item.detalhe ? `<p>${item.detalhe}</p>` : ""}
      ${item.relacionados && item.relacionados.length ? `<p class="card-rel"><strong>Related:</strong> ${item.relacionados.join(", ")}</p>` : ""}
    </div>` : ""}
  </div>`;
}

// RENDER CONTENT
function renderContent() {
  const pilar = PILARES.find(p => p.id === activePilar);
  document.getElementById("content-title").textContent    = `${pilar.icon} ${pilar.label}`;
  document.getElementById("content-subtitle").textContent = pilar.desc;

  const items = itemsForPilar(activePilar);
  const grid  = document.getElementById("cards-grid");
  const empty = document.getElementById("empty-state");

  if (!items.length) { grid.innerHTML = ""; empty.style.display = "block"; return; }
  empty.style.display = "none";

  if (activePilar === "personas") {
    const GRP = [
      { key:"sales",      label:"Sales & Pre-Sales" },
      { key:"operations", label:"Operations & Leadership" },
      { key:"external",   label:"External" }
    ];
    grid.innerHTML = GRP.map(g => {
      const gi = items.filter(i => i.grupo === g.key);
      if (!gi.length) return "";
      return `<div class="persona-group-label">${g.label}</div>` + gi.map(renderCard).join("");
    }).join("");
  } else {
    grid.innerHTML = items.map(renderCard).join("");
  }
}

// ACTIONS
function toggleFilter(group, tag) {
  activeFilters[group].has(tag) ? activeFilters[group].delete(tag) : activeFilters[group].add(tag);
  render();
}
function switchPilar(id) { activePilar = id; render(); }
function toggleCard(id) {
  const det = document.getElementById(`det-${id}`);
  const btn = det.previousElementSibling.querySelector(".expand-btn");
  det.classList.toggle("open");
  btn.textContent = det.classList.contains("open") ? "▲ See less" : "▼ See more";
}

function render() { renderFilters(); renderSidebar(); renderContent(); }

document.getElementById("topbar").addEventListener("click", e => {
  const p = e.target.closest(".pill");
  if (p) toggleFilter(p.dataset.group, p.dataset.tag);
});
document.getElementById("sidebar").addEventListener("click", e => {
  const b = e.target.closest(".pilar-btn");
  if (b) switchPilar(b.dataset.pilar);
});

render();
</script>
</body>
</html>
